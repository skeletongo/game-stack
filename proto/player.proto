syntax = "proto3";

package player;

option go_package = "github.com/skeletongo/game-stack/proto/player";

// ==== 路由 ====

// PlayerRoute 玩家模块路由编号（2000-2999）。
enum PlayerRoute {
    PLAYER_ROUTE_UNSPECIFIED = 0;  // proto3 要求首个值为 0
    GET_INFO                 = 2000; // 查询玩家信息
    SET_AVATAR               = 2001; // 修改头像
    LEVEL_UP                 = 2002; // 升级推送
}

// ==== 错误码 ====

// PlayerError 玩家模块错误码（2000-2999）。
enum PlayerError {
    PLAYER_ERROR_UNSPECIFIED = 0;  // proto3 要求首个值为 0
    PLAYER_NOT_FOUND         = 2000; // 未找到
    INVALID_LEVEL            = 2001; // 等级不合法
    INSUFFICIENT_GOLD        = 2002; // 金币不足
    NAME_TOO_LONG            = 2003; // 名称太长
    INSUFFICIENT_DIAMOND     = 2004; // 钻石不足
    INVALID_EXP              = 2005; // 经验值不合法
}

// ==== 消息 ====

// PlayerInfo 玩家基本信息。
message PlayerInfo {
    int64  id         = 1; // 玩家id
    string nickname   = 2; // 昵称
    int32  level      = 3; // 等级
    int64  exp        = 4; // 经验值
    string avatar     = 5; // 头像
    int32  gold       = 6; // 金币
    int32  diamond    = 7; // 钻石
    int64  created_at = 8; // 创建时间
}

// GetInfo 查询玩家信息。
message GetInfoRequest {
    int64 player_id = 1; // 玩家id
}

message GetInfoResponse {
    int32  code    = 1; // 错误码，0 表示成功
    string message = 2; // 错误描述
    PlayerInfo player = 3; // 玩家信息
}

// SetAvatar 设置头像。
message SetAvatarRequest {
    string avatar = 1; // 头像
}

// SetAvatarResponse 修改头像响应。
message SetAvatarResponse {
    int32  code    = 1; // 错误码，0 表示成功
    string message = 2; // 错误描述
}

// LevelUpEvent 升级推送（服务器主动下推）。
message LevelUpEvent {
    int32 old_level = 1; // 原等级
    int32 new_level = 2; // 新等级
    int64 exp_gain  = 3; // 增加经验
}
