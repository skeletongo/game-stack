syntax = "proto3";

package auth;

option go_package = "github.com/skeletongo/game-stack/proto/auth";

// ==== 路由 ====

// AuthRoute 认证模块路由编号（1000-1999）。
enum AuthRoute {
    AUTH_ROUTE_UNSPECIFIED  = 0;   // proto3 要求首个值为 0
    LOGIN                   = 1001; // 登录
    REGISTER                = 1002; // 注册
    LOGOUT                  = 1003; // 登出
    TOKEN_REFRESH           = 1004; // 刷新token
    KICK                    = 1005; // 踢出
}

// ==== 错误码 ====

// AuthError 认证模块错误码（1000-1999）。
enum AuthError {
    AUTH_ERROR_UNSPECIFIED = 0;   // proto3 要求首个值为 0
    INVALID_TOKEN          = 1000; // 无效token
    TOKEN_EXPIRED          = 1001; // token过期
    ACCOUNT_EXISTS         = 1002; // 账号已存在
    WRONG_PASSWORD         = 1003; // 密码错误
    ACCOUNT_BANNED         = 1004; // 账号禁用
    LOGIN_ELSEWHERE        = 1005; // 在其它地方登录
    NICKNAME_EXISTS        = 1006; // 昵称已存在
    NICKNAME_TOO_LONG      = 1007; // 昵称太长
}

// ==== 消息 ====

// Login
message LoginRequest {
    string username = 1;
    string password = 2;
    string platform = 3;
    string device_id = 4;
}

message LoginResponse {
    string token        = 1;
    int64  player_id    = 2;
    int64  expires_at   = 3;
    bool   is_new_player = 4;
}

// Register
message RegisterRequest {
    string username = 1;
    string password = 2;
    string nickname = 3;
}

message RegisterResponse {
    string token     = 1;
    int64  player_id = 2;
}

// Logout
message LogoutRequest {}

// Token Refresh
message TokenRefreshRequest {
    string token = 1;
}

message TokenRefreshResponse {
    string token      = 1;
    int64  expires_at = 2;
}
