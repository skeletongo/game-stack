syntax = "proto3";

package auth;

option go_package = "github.com/skeletongo/game-stack/proto/auth";

// Login
message LoginRequest {
    string username = 1;
    string password = 2;
    string platform = 3;
    string device_id = 4;
}

message LoginResponse {
    string token       = 1;
    int64  player_id   = 2;
    int64  expires_at  = 3;
    bool   is_new_player = 4;
}

// Register
message RegisterRequest {
    string username = 1;
    string password = 2;
    string nickname = 3;
}

message RegisterResponse {
    string token     = 1;
    int64  player_id = 2;
}

// Logout
message LogoutRequest {}

// Token Refresh
message TokenRefreshRequest {
    string token = 1;
}

message TokenRefreshResponse {
    string token      = 1;
    int64  expires_at = 2;
}
