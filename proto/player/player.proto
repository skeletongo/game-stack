syntax = "proto3";

package player;

option go_package = "github.com/skeletongo/game-stack/proto/player";

// ==== 路由 ====

// PlayerRoute 玩家模块路由编号（2000-2999）。
enum PlayerRoute {
    PLAYER_ROUTE_UNSPECIFIED = 0;  // proto3 要求首个值为 0
    GET_INFO                 = 2001; // 查询玩家信息
    SET_AVATAR               = 2002; // 修改头像
    LEVEL_UP                 = 2003; // 升级推送
}

// ==== 错误码 ====

// PlayerError 玩家模块错误码（2000-2999）。
enum PlayerError {
    PLAYER_ERROR_UNSPECIFIED = 0;  // proto3 要求首个值为 0
    PLAYER_NOT_FOUND         = 2000; // 未找到
    NAME_TOO_LONG            = 2003; // 太长
}

// ==== 消息 ====

// PlayerInfo 玩家基本信息。
message PlayerInfo {
    int64  id         = 1;
    string nickname   = 2;
    int32  level      = 3;
    int64  exp        = 4;
    string avatar     = 5;
    int32  gold       = 6;
    int32  diamond    = 7;
    int64  created_at = 8;
}

// GetInfo 查询玩家信息。
message GetInfoRequest {
    int64 player_id = 1;
}

message GetInfoResponse {
    PlayerInfo player = 1;
}

// SetAvatar 设置头像。
message SetAvatarRequest {
    string avatar = 1;
}

// LevelUpEvent 升级推送（服务器主动下推）。
message LevelUpEvent {
    int32 old_level = 1;
    int32 new_level = 2;
    int64 exp_gain  = 3;
}
