syntax = "proto3";

package auth;

option go_package = "github.com/skeletongo/game-stack/proto/auth";

// ==== 路由 ====

// AuthRoute 认证模块路由编号（1000-1999）。
enum AuthRoute {
    AUTH_ROUTE_UNSPECIFIED  = 0;   // proto3 要求首个值为 0
    LOGIN                   = 1001; // 登录
    REGISTER                = 1002; // 注册
    LOGOUT                  = 1003; // 登出
    TOKEN_REFRESH           = 1004; // 刷新token
    KICK                    = 1005; // 踢出
    TOKEN_LOGIN             = 1006; // token登录长连接
}

// ==== 错误码 ====

// AuthError 认证模块错误码（1000-1999）。
enum AuthError {
    AUTH_ERROR_UNSPECIFIED = 0;   // proto3 要求首个值为 0
    INVALID_TOKEN          = 1000; // 无效token
    TOKEN_EXPIRED          = 1001; // token过期
    ACCOUNT_EXISTS         = 1002; // 账号已存在
    WRONG_PASSWORD         = 1003; // 密码错误
    ACCOUNT_BANNED         = 1004; // 账号禁用
    LOGIN_ELSEWHERE        = 1005; // 在其它地方登录
    NICKNAME_EXISTS        = 1006; // 昵称已存在
    NICKNAME_TOO_LONG      = 1007; // 昵称太长
    INVALID_USERNAME       = 1008; // 用户名不合法
    INVALID_NICKNAME       = 1009; // 昵称不合法
}

// ==== 消息 ====

// LOGIN
message LoginRequest {
    string username = 1; // 账号名
    string password = 2; // 密码
    int64 game_id = 3; // 游戏id
}

message LoginResponse {
    int32  code         = 1; // 错误码，0 表示成功
    string message      = 2; // 错误描述
    string token        = 3; // 登录令牌
    int64  expires_at   = 4; // token过期时间
    int64  player_id    = 5; // 玩家id
    bool   is_new_player = 6; // 首次登录
    int64  unix_nano     = 7; // 服务器时间戳，纳秒
}

// TOKEN_LOGIN
message TokenLoginRequest {
    string token = 1; // 短连接登录获得的token
}

message TokenLoginResponse {
    int32  code       = 1; // 错误码，0 表示成功
    string message    = 2; // 错误描述
    int64  player_id  = 3; // 玩家id
    int64  expires_at = 4; // token过期时间
    int64  unix_nano  = 5; // 服务器时间戳，纳秒
}

// REGISTER
message RegisterRequest {
    string username = 1; // 账号名
    string password = 2; // 密码
    string nickname = 3; // 昵称
}

message RegisterResponse {
    int32  code      = 1; // 错误码，0 表示成功
    string message   = 2; // 错误描述
}

// LOGOUT
message LogoutRequest {}

// TOKEN_REFRESH
message TokenRefreshRequest {
    string token = 1; // 原登录令牌
}

message TokenRefreshResponse {
    int32  code       = 1; // 错误码，0 表示成功
    string message    = 2; // 错误描述
    string token      = 3; // 新登录令牌
    int64  expires_at = 4; // token过期时间
}

// KICK
enum KickReason {
    KICK_REASON_UNSPECIFIED = 0;    // proto3 要求首个值为 0
    LoginElseWhere = 1;   // 在其它地方登录
}

message KickResponse {
    KickReason reason = 1; // 踢出原因
}
