syntax = "proto3";

package auth;

option go_package = "github.com/skeletongo/game-stack/proto/auth";

// ==== 路由 ====

// AuthRoute 认证模块路由编号（1000-1999）。
enum AuthRoute {
    AUTH_ROUTE_UNSPECIFIED  = 0;   // proto3 要求首个值为 0
    LOGIN                   = 1001; // 登录
    REGISTER                = 1002; // 注册
    LOGOUT                  = 1003; // 登出
    TOKEN_REFRESH           = 1004; // 刷新token
    KICK                    = 1005; // 踢出
}

// ==== 错误码 ====

// AuthError 认证模块错误码（1000-1999）。
enum AuthError {
    AUTH_ERROR_UNSPECIFIED = 0;   // proto3 要求首个值为 0
    INVALID_TOKEN          = 1000; // 无效token
    TOKEN_EXPIRED          = 1001; // token过期
    ACCOUNT_EXISTS         = 1002; // 账号已存在
    WRONG_PASSWORD         = 1003; // 密码错误
    ACCOUNT_BANNED         = 1004; // 账号禁用
    LOGIN_ELSEWHERE        = 1005; // 在其它地方登录
    NICKNAME_EXISTS        = 1006; // 昵称已存在
    NICKNAME_TOO_LONG      = 1007; // 昵称太长
    INVALID_USERNAME       = 1008; // 用户名不合法
    INVALID_NICKNAME       = 1009; // 昵称不合法
}

// ==== 消息 ====

// LOGIN
message LoginRequest {
    string username = 1;
    string password = 2;
    string platform = 3;
    string device_id = 4;
}

message LoginResponse {
    int32  code         = 1; // 错误码，0 表示成功
    string message      = 2; // 错误描述
    string token        = 3;
    int64  player_id    = 4;
    int64  expires_at   = 5;
    bool   is_new_player = 6;
}

// REGISTER
message RegisterRequest {
    string username = 1;
    string password = 2;
    string nickname = 3;
}

message RegisterResponse {
    int32  code      = 1; // 错误码，0 表示成功
    string message   = 2; // 错误描述
    string token     = 3;
    int64  player_id = 4;
}

// LOGOUT
message LogoutRequest {}

// TOKEN_REFRESH
message TokenRefreshRequest {
    string token = 1;
}

message TokenRefreshResponse {
    int32  code       = 1; // 错误码，0 表示成功
    string message    = 2; // 错误描述
    string token      = 3;
    int64  expires_at = 4;
}

// KICK
enum KickReason {
    KICK_REASON_UNSPECIFIED = 0;    // proto3 要求首个值为 0
    LoginElseWhere = 1;   // 在其它地方登录
}

message KickResponse {
    KickReason reason = 1;
}
