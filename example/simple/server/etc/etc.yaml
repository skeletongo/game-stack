pid: ./run/server.pid
mode: debug
timezone: Local

cluster:
  node:
    id:
    name: server
    codec: proto
    timeout: 3s

locate:
  redis:
    addrs:
      - 127.0.0.1:6379
    db: 4
    username: ""
    password: ""
    maxRetries: 3
    prefix: due

registry:
  etcd:
    addrs:
      - 127.0.0.1:2379
    dialTimeout: 5s
    namespace: game-stack
    timeout: 3s
    retryTimes: 3
    retryInterval: 10s

transport:
  grpc:
    server:
      addr: :0
      keyFile: ""
      certFile: ""
    client:
      certFile: ""
      serverName: ""

log:
  file: ./log/due.log
  level: debug
  format: text
  stdout: true
  timeFormat: 2006/01/02 15:04:05.000000
  stackLevel: error
  fileMaxAge: 7d
  fileMaxSize: 100
  fileCutRule: day
  callerFullPath: true
  classifiedStorage: false

packet:
  bufferBytes: 100000
  byteOrder: big
  routeBytes: 4
  seqBytes: 4